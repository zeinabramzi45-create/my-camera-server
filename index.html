<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة صور الكاميرا</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        img { max-width: 100%; border-radius: 8px; margin-top: 15px; display: none; border: 2px solid #ddd; }
        .status { color: #28a745; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>لوحة استقبال صور الكاميرا (طريقة الـ Multipart) 📸</h2>
        <p id="status-text">جاري فحص السيرفر...</p>
        <img id="camera-frame" src="" alt="Camera Stream">
    </div>

    <script>
        async function fetchImage() {
            try {
                const response = await fetch('/api/upload');
                const data = await response.json();
                
                if (data.data) {
                    const img = document.getElementById('camera-frame');
                    img.src = "data:image/jpeg;base64," + data.data;
                    img.style.display = "block";
                    document.getElementById('status-text').innerText = "آخر صورة وصلت في: " + new Date(data.time).toLocaleString('ar-EG');
                } else {
                    document.getElementById('status-text').innerText = "السيرفر شغال ومستني أول صورة من الكاميرا... 📡";
                }
            } catch (err) {
                document.getElementById('status-text').innerText = "خطأ في الاتصال بالسيرفر";
            }
        }
        fetchImage();
        setInterval(fetchImage, 3000); // تحديث تلقائي كل 3 ثواني
    </script>
</body>
</html>
